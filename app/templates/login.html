{% extends "base.html" %}

{% block content %}
<div class="auth-page">
    <div class="auth-card-wrap">
        <div class="card auth-card auth-card-compact">
            <div class="auth-badge">Вход</div>

            <div class="auth-head">
                <h2 class="auth-title">Вход в ESSAYra</h2>
                <p class="auth-text">
                    Используй email или nickname и пароль, чтобы открыть доступ к заданиям и проверке сочинений.
                </p>
            </div>

            {% if error %}
            <div class="inline-error">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/login" class="auth-form auth-form-vertical">
                <div class="auth-grid">
                    <label class="auth-label">
                        <span>Email или nickname</span>
                        <input
                            type="text"
                            name="login_value"
                            class="auth-input"
                            placeholder="Введите email или nickname"
                            required
                        >
                    </label>

                    <label class="auth-label">
                        <span>Пароль</span>
                        <input
                            type="password"
                            name="password"
                            class="auth-input"
                            placeholder="Введите пароль"
                            required
                        >
                    </label>
                </div>

                <div class="auth-actions">
                    <button type="submit" class="button primary auth-submit">Войти</button>
                </div>
            </form>

            <div class="auth-footer">
                <span>Нет аккаунта?</span>
                <a href="/register">Зарегистрироваться</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
