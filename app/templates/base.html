<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESSAYra</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="icon" type="image/png" href="/static/logo.png">
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <div class="page-shell">
        <div class="container">
            <header class="header">
                <div class="topbar">
                    <a href="/" class="brand brand-link">
                        <div class="brand-logo-wrap">
                            <img src="/static/logo.png" alt="ESSAYra" class="brand-logo">
                        </div>
                        <div class="brand-copy">
                            <h1>ESSAYra</h1>
                            <p class="subtitle">ИИ-проверка сочинений ОГЭ и ЕГЭ</p>
                        </div>
                    </a>

                    {% if current_user %}
                    <div class="user-panel">
                        <div class="user-panel-meta">
                            <div class="user-panel-label">Аккаунт</div>
                            <div class="user-panel-name">{{ current_user.nickname }}</div>
                        </div>
                        <a href="/logout" class="button secondary small">Выйти</a>
                    </div>
                    {% endif %}
                </div>
            </header>

            {% block content %}{% endblock %}
        </div>
    </div>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
